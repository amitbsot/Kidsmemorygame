<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

    <script src="react.production.min.js"></script>
    <script src="react-dom.production.min.js"></script>
    <script src="babel.min.js"></script>
    <script src="tailwind.js"></script>

    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
            touch-action: pan-y;
        }

        .seo-content, .legal-content {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .transition-transform { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceMatch {
            0%, 100% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.1) rotateY(180deg); }
        }
        .animate-bounce-match { animation: bounceMatch 0.5s ease-in-out; }

        @keyframes bounceUI {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .animate-bounce-ui { animation: bounceUI 0.5s ease-in-out; }

        .bg-polka {
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 3px, transparent 3px);
            background-size: 40px 40px;
        }
        
        .emoji-shadow {
            filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15));
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotateY(180deg); }
            20% { transform: translateX(-6px) rotateY(180deg) rotate(-3deg); }
            40% { transform: translateX(6px) rotateY(180deg) rotate(3deg); }
            60% { transform: translateX(-6px) rotateY(180deg) rotate(-3deg); }
            80% { transform: translateX(6px) rotateY(180deg) rotate(3deg); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0;
        }
        @keyframes fall {
            0% { opacity: 1; top: -10%; transform: translateX(0) rotate(0deg); }
            100% { opacity: 1; top: 110%; transform: translateX(20px) rotate(360deg); }
        }
        
        .fullscreen-active {
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            border: none !important;
            padding: 2rem !important;
            touch-action: none !important;
            overscroll-behavior: none !important;
        }
    </style>
</head>
<body class="overflow-x-hidden bg-polka text-gray-800">
    
    <button id="installApp" style="display:none; position: fixed; bottom: 20px; right: 20px; z-index: 100;" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transform transition active:scale-95 text-lg flex items-center gap-2 bounceUI animate-bounce-ui overflow-visible">
        התקן אפליקציה 📲
    </button>

    <div id="root" class="min-h-screen flex flex-col"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef } = React;

        // Function to trigger Monetag Vignette Ad
        const showAd = () => {
            if (typeof window.showVignette === 'function') {
                window.showVignette();
            }
        };

        const LegalModal = ({ title, content, onClose }) => (
            <div className="fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex justify-center items-center p-4">
                <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl animate-fade-in">
                    <div className="flex justify-between items-center p-4 sm:p-6 border-b">
                        <h2 className="text-2xl font-bold text-blue-600">{title}</h2>
                        <button onClick={onClose} className="text-gray-400 hover:text-red-500 text-2xl font-bold transition">✕</button>
                    </div>
                    <div className="p-4 sm:p-6 overflow-y-auto legal-content text-gray-600 text-sm sm:text-base space-y-4">
                        {content}
                    </div>
                </div>
            </div>
        );

        const Header = () => (
            <header className="bg-white/90 backdrop-blur-md border-b border-green-200 py-4 px-6 sticky top-0 z-40 flex justify-between items-center shadow-sm">
                <div className="flex items-center gap-2">
                    <span className="text-3xl emoji-shadow">🧠</span>
                    <h1 className="text-xl sm:text-2xl font-extrabold text-blue-600 tracking-tight">Kids Memory Game</h1>
                </div>
                <nav className="hidden sm:flex gap-4 font-bold text-green-600">
                    <a href="#about-game" className="hover:text-blue-500 transition">How to Play</a>
                    <a href="#features" className="hover:text-blue-500 transition">Features</a>
                </nav>
            </header>
        );

        const SeoContentSection = () => (
            <article className="seo-content max-w-4xl mx-auto p-6 sm:p-10 bg-white/95 rounded-3xl shadow-xl mt-8 mb-12 border-4 border-green-100">
                <h2 id="about-game" className="text-3xl sm:text-4xl font-extrabold text-blue-600 mb-6 text-center">
                    Welcome to the Ultimate Kids Memory Game!
                </h2>
                <div className="space-y-6 text-gray-700 leading-relaxed text-lg">
                    <p>
                        Our <strong>Free Kids Memory Game</strong> is designed to provide hours of fun while simultaneously enhancing cognitive skills, concentration, and short-term memory.
                    </p>
                </div>
            </article>
        );

        let preferredVoice = null;
        const updateVoiceSelection = () => {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Samantha') || v.name.includes('Victoria') || v.name.includes('Female'))) 
                          || voices.find(v => v.lang.includes('en'))
                          || null;
        };

        if ('speechSynthesis' in window) {
            updateVoiceSelection();
            window.speechSynthesis.onvoiceschanged = updateVoiceSelection;
        }

        const CATEGORIES = {
            animals: { id: 'animals', title: 'Animals', color: 'bg-orange-400', items: [{ content: '🐶', label: 'Dog' }, { content: '🐱', label: 'Cat' }, { content: '🐭', label: 'Mouse' }, { content: '🐰', label: 'Rabbit' }, { content: '🦊', label: 'Fox' }, { content: '🐻', label: 'Bear' }, { content: '🐼', label: 'Panda' }, { content: '🦁', label: 'Lion' }] },
            abc: { id: 'abc', title: 'Letters', color: 'bg-blue-400', items: [{ content: 'A', label: 'A' }, { content: 'B', label: 'B' }, { content: 'C', label: 'C' }, { content: 'D', label: 'D' }, { content: 'E', label: 'E' }, { content: 'F', label: 'F' }] },
            colors: { id: 'colors', title: 'Colors', color: 'bg-red-400', items: [{ content: '🔴', label: 'Red' }, { content: '🔵', label: 'Blue' }, { content: '🟢', label: 'Green' }, { content: '🟡', label: 'Yellow' }, { content: '🟠', label: 'Orange' }, { content: '🟣', label: 'Purple' }] },
            fruits: { id: 'fruits', title: 'Fruits', color: 'bg-green-400', items: [{ content: '🍎', label: 'Apple' }, { content: '🍌', label: 'Banana' }, { content: '🥕', label: 'Carrot' }, { content: '🍅', label: 'Tomato' }, { content: '🍊', label: 'Orange' }, { content: '🥦', label: 'Broccoli' }] },
            transport: { id: 'transport', title: 'Vehicles', color: 'bg-yellow-400', items: [{ content: '🚗', label: 'Car' }, { content: '🚌', label: 'Bus' }, { content: '🚂', label: 'Train' }, { content: '✈️', label: 'Airplane' }, { content: '⛵', label: 'Boat' }, { content: '🚀', label: 'Rocket' }] },
            shapes: { id: 'shapes', title: 'Shapes', color: 'bg-purple-400', items: [{ content: '⭕', label: 'Circle' }, { content: '🟥', label: 'Square' }, { content: '🔺', label: 'Triangle' }, { content: '⭐', label: 'Star' }, { content: '❤️', label: 'Heart' }, { content: '💎', label: 'Diamond' }] }
        };

        const LEVELS = [
            { level: 1, pairs: 3, cols: 'grid-cols-2 sm:grid-cols-3', rows: 'grid-rows-3 sm:grid-rows-2' },
            { level: 2, pairs: 6, cols: 'grid-cols-3 sm:grid-cols-4', rows: 'grid-rows-4 sm:grid-rows-3' },
            { level: 3, pairs: 8, cols: 'grid-cols-4', rows: 'grid-rows-4' },
            { level: 4, pairs: 10, cols: 'grid-cols-4 md:grid-cols-5', rows: 'grid-rows-5 md:grid-rows-4' },
            { level: 5, pairs: 12, cols: 'grid-cols-4 md:grid-cols-6', rows: 'grid-rows-6 md:grid-rows-4' }
        ];

        const playVoice = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        };

        const Confetti = () => {
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42e2b8'];
            const pieces = Array.from({ length: 50 }).map((_, i) => ({
                id: i, left: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 2}s`, animationDuration: `${Math.random() * 2 + 2}s`, backgroundColor: colors[Math.floor(Math.random() * colors.length)]
            }));
            return (
                <div className="absolute inset-0 pointer-events-none z-[70] overflow-hidden">
                    {pieces.map(p => <div key={p.id} className="confetti rounded-full" style={{ left: p.left, backgroundColor: p.backgroundColor, animation: `fall ${p.animationDuration} linear ${p.animationDelay} infinite` }} /> )}
                </div>
            );
        };

        const App = () => {
            const [activeModal, setActiveModal] = useState(null); 
            const [gameState, setGameState] = useState('menu'); 
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
            const [previousLevelItems, setPreviousLevelItems] = useState([]);

            const [cards, setCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [mismatchIndices, setMismatchIndices] = useState([]); 
            const [matches, setMatches] = useState(0);
            const [isLocked, setIsLocked] = useState(false);
            const [highlightMatch, setHighlightMatch] = useState(null); 
            const [isFullscreen, setIsFullscreen] = useState(false);
            const boardRef = useRef(null);

            const resetToMenu = () => {
                showAd(); // Trigger Ad on return to menu
                setGameState('menu');
                setSelectedCategory(null);
                setPreviousLevelItems([]); 
                if (document.fullscreenElement) document.exitFullscreen();
            };

            const initGame = (categoryKey, levelIdx) => {
                showAd(); // Trigger Ad on stage change
                const category = CATEGORIES[categoryKey];
                const level = LEVELS[levelIdx];
                let selectedItems = [];
                const shuffledItems = [...category.items].sort(() => 0.5 - Math.random());
                selectedItems = shuffledItems.slice(0, level.pairs);

                setPreviousLevelItems(selectedItems);
                setSelectedCategory(categoryKey);
                setCurrentLevelIndex(levelIdx);
                
                const gameCards = [...selectedItems, ...selectedItems].sort(() => 0.5 - Math.random()).map((item, index) => ({
                    id: index, ...item, isFlipped: false, isMatched: false
                }));

                setCards(gameCards);
                setFlippedIndices([]);
                setMismatchIndices([]);
                setMatches(0);
                setIsLocked(false);
                setHighlightMatch(null);
                setGameState('playing');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCardClick = (index) => {
                if (isLocked || cards[index].isFlipped || cards[index].isMatched) return;
                const newFlippedIndices = [...flippedIndices, index];
                setCards(prev => prev.map((c, i) => i === index ? { ...c, isFlipped: true } : c));
                setFlippedIndices(newFlippedIndices);

                if (newFlippedIndices.length === 1) {
                    playVoice(cards[index].label);
                } else if (newFlippedIndices.length === 2) {
                    setIsLocked(true);
                    const [firstIndex, secondIndex] = newFlippedIndices;
                    const isMatch = cards[firstIndex].label === cards[secondIndex].label;

                    setTimeout(() => {
                        if (isMatch) {
                            setHighlightMatch(cards[firstIndex]);
                            setTimeout(() => {
                                setCards(prev => prev.map((c, i) => (i === firstIndex || i === secondIndex) ? { ...c, isMatched: true } : c));
                                setFlippedIndices([]); setMatches(m => m + 1); setHighlightMatch(null); setIsLocked(false);
                            }, 1500); 
                        } else {
                            setMismatchIndices([firstIndex, secondIndex]);
                            setTimeout(() => {
                                setCards(prev => prev.map((c, i) => (i === firstIndex || i === secondIndex) ? { ...c, isFlipped: false } : c));
                                setFlippedIndices([]); setMismatchIndices([]); setIsLocked(false);
                            }, 800);
                        }
                    }, 1000);
                }
            };

            const currentLevel = LEVELS[currentLevelIndex];
            const isPlaying = gameState === 'playing' || gameState === 'won';

            useEffect(() => {
                if (currentLevel && matches > 0 && matches === currentLevel.pairs && gameState === 'playing') {
                    setTimeout(() => setGameState('won'), 800);
                }
            }, [matches, currentLevel, gameState]);

            return (
                <>
                    {!isPlaying && <Header />}
                    <main className={`flex-1 flex flex-col relative w-full items-center ${isPlaying ? 'h-[100dvh]' : ''}`}>
                        <div className={`w-full max-w-7xl mx-auto relative flex items-center justify-center shrink-0 ${isPlaying ? 'flex-1 h-full p-2 sm:p-4' : 'min-h-[400px] p-4'}`}>
                            
                            {(gameState === 'menu' || gameState === 'level_select') && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center z-20">
                                    <div className="bg-white/95 rounded-3xl shadow-xl p-8 max-w-lg w-full text-center border-4 border-yellow-300">
                                        <h2 className="text-3xl font-extrabold text-blue-600 mb-8">Select Game</h2>
                                        {gameState === 'menu' ? (
                                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                                {Object.keys(CATEGORIES).map(key => (
                                                    <button key={key} onClick={() => { setSelectedCategory(key); setGameState('level_select'); }} className={`${CATEGORIES[key].color} text-white font-bold py-6 rounded-2xl shadow-md active:scale-95 flex flex-col items-center`}>
                                                        <span className="text-3xl">{CATEGORIES[key].items[0].content}</span>
                                                        <span className="text-sm">{CATEGORIES[key].title}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="animate-fade-in">
                                                <button onClick={() => setGameState('menu')} className="bg-gray-100 text-gray-600 font-bold py-2 px-4 rounded-xl mb-6">⬅️ Back</button>
                                                <div className="grid grid-cols-2 gap-4">
                                                    {LEVELS.map((lvl, idx) => (
                                                        <button key={idx} onClick={() => initGame(selectedCategory, idx)} className="bg-yellow-100 text-yellow-900 border-2 border-yellow-400 font-bold py-4 rounded-2xl active:scale-95">
                                                            Stage {lvl.level}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {isPlaying && (
                                <div className="absolute inset-0 flex flex-col items-center p-2 w-full h-full">
                                    <div className="w-full flex justify-between items-center mb-2 z-10">
                                        <button onClick={resetToMenu} className="bg-white text-blue-500 font-bold py-2 px-4 rounded-xl shadow border-2 border-blue-200">Menu</button>
                                        <h3 className="text-xl font-bold">Stage {currentLevelIndex + 1}</h3>
                                        <div className="text-lg font-bold text-green-600 bg-white px-3 py-2 rounded-xl shadow">
                                            {matches} / {currentLevel.pairs}
                                        </div>
                                    </div>

                                    <div ref={boardRef} className="flex-1 w-full bg-blue-50/70 border-4 border-blue-300 rounded-[2rem] p-4 relative">
                                        <div className={`grid gap-2 w-full h-full ${currentLevel.cols} ${currentLevel.rows} perspective-1000 mx-auto justify-items-center items-center`}>
                                            {cards.map((card, index) => (
                                                <div key={index} onClick={() => handleCardClick(index)} className={`relative w-full h-full cursor-pointer transform-style-3d transition-transform ${card.isFlipped || card.isMatched ? 'rotate-y-180' : ''} ${card.isMatched ? 'animate-bounce-match opacity-90' : ''}`}>
                                                    <div className="absolute inset-0 bg-orange-400 rounded-xl border-4 border-white flex justify-center items-center backface-hidden">
                                                        <span className="text-white text-4xl">?</span>
                                                    </div>
                                                    <div className="absolute inset-0 bg-white rounded-xl border-4 border-blue-200 flex justify-center items-center backface-hidden rotate-y-180">
                                                        <span className="text-5xl">{card.content}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {highlightMatch && (
                                            <div className="absolute inset-0 flex items-center justify-center z-[60] bg-black/30 backdrop-blur-sm">
                                                <div className="bg-white rounded-[3rem] p-12 shadow-2xl animate-bounce-ui border-8 border-yellow-300 flex flex-col items-center">
                                                    <span className="text-8xl mb-4">{highlightMatch.content}</span>
                                                    <span className="text-4xl font-black text-blue-600 uppercase">{highlightMatch.label}</span>
                                                </div>
                                            </div>
                                        )}

                                        {gameState === 'won' && (
                                            <div className="absolute inset-0 flex items-center justify-center bg-black/40 z-[60] backdrop-blur-md rounded-inherit">
                                                <Confetti />
                                                <div className="bg-white rounded-[2rem] p-8 shadow-2xl text-center max-w-md w-full border-8 border-yellow-400">
                                                    <h2 className="text-4xl font-black text-green-500 mb-6">Awesome! 🎉</h2>
                                                    <div className="flex flex-col gap-4">
                                                        {currentLevelIndex < LEVELS.length - 1 ? (
                                                            <button onClick={() => initGame(selectedCategory, currentLevelIndex + 1)} className="bg-blue-500 text-white font-bold py-4 rounded-2xl text-xl">Next Stage ➡️</button>
                                                        ) : (
                                                            <button onClick={() => initGame(selectedCategory, 0)} className="bg-blue-500 text-white font-bold py-4 rounded-2xl text-xl">Play Again</button>
                                                        )}
                                                        <button onClick={resetToMenu} className="bg-gray-200 text-gray-800 font-bold py-3 rounded-2xl">Main Menu</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                        {!isPlaying && <SeoContentSection />}
                    </main>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

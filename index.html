<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Memory Game</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React, ReactDOM & Babel (Stable CDNJS links for local file support) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
            touch-action: manipulation;
        }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .transition-transform { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceMatch {
            0%, 100% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.1) rotateY(180deg); }
        }
        .animate-bounce-match { animation: bounceMatch 0.5s ease-in-out; }

        @keyframes bounceUI {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .animate-bounce-ui { animation: bounceUI 0.5s ease-in-out; }

        .bg-polka {
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 3px, transparent 3px);
            background-size: 40px 40px;
        }
        
        .emoji-shadow {
            filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15));
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotateY(180deg); }
            20% { transform: translateX(-6px) rotateY(180deg) rotate(-3deg); }
            40% { transform: translateX(6px) rotateY(180deg) rotate(3deg); }
            60% { transform: translateX(-6px) rotateY(180deg) rotate(-3deg); }
            80% { transform: translateX(6px) rotateY(180deg) rotate(3deg); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0;
        }
        @keyframes fall {
            0% { opacity: 1; top: -10%; transform: translateX(0) rotate(0deg); }
            100% { opacity: 1; top: 110%; transform: translateX(20px) rotate(360deg); }
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef } = React;

        let preferredVoice = null;
        const updateVoiceSelection = () => {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Samantha') || v.name.includes('Victoria') || v.name.includes('Female') || v.name.includes('Google UK English Female'))) 
                          || voices.find(v => v.lang.includes('en') && v.name.includes('Google'))
                          || voices.find(v => v.lang === 'en-US') 
                          || null;
        };

        if ('speechSynthesis' in window) {
            updateVoiceSelection();
            window.speechSynthesis.onvoiceschanged = updateVoiceSelection;
        }

        const CATEGORIES = {
            abc: {
                id: 'abc', title: 'Letters', color: 'bg-blue-400',
                items: [
                    { content: 'A', label: 'A', spokenLabel: 'a' }, { content: 'B', label: 'B', spokenLabel: 'b' },
                    { content: 'C', label: 'C', spokenLabel: 'c' }, { content: 'D', label: 'D', spokenLabel: 'd' },
                    { content: 'E', label: 'E', spokenLabel: 'e' }, { content: 'F', label: 'F', spokenLabel: 'f' },
                    { content: 'G', label: 'G', spokenLabel: 'g' }, { content: 'H', label: 'H', spokenLabel: 'h' }
                ]
            },
            colors: {
                id: 'colors', title: 'Colors', color: 'bg-red-400',
                items: [
                    { content: '🔴', label: 'Red' }, { content: '🔵', label: 'Blue' },
                    { content: '🟢', label: 'Green' }, { content: '🟡', label: 'Yellow' },
                    { content: '🟠', label: 'Orange' }, { content: '🟣', label: 'Purple' },
                    { content: '⚫', label: 'Black' }, { content: '⚪', label: 'White' }
                ]
            },
            fruits: {
                id: 'fruits', title: 'Fruits', color: 'bg-green-400',
                items: [
                    { content: '🍎', label: 'Apple' }, { content: '🍌', label: 'Banana' },
                    { content: '🥕', label: 'Carrot' }, { content: '🍅', label: 'Tomato' },
                    { content: '🍊', label: 'Orange' }, { content: '🥦', label: 'Broccoli' },
                    { content: '🍇', label: 'Grapes' }, { content: '🍉', label: 'Watermelon' }
                ]
            },
            transport: {
                id: 'transport', title: 'Vehicles', color: 'bg-yellow-400',
                items: [
                    { content: '🚗', label: 'Car' }, { content: '🚌', label: 'Bus' },
                    { content: '🚂', label: 'Train' }, { content: '✈️', label: 'Airplane' },
                    { content: '⛵', label: 'Boat' }, { content: '🚲', label: 'Bicycle' },
                    { content: '🚁', label: 'Helicopter' }, { content: '🚀', label: 'Rocket' }
                ]
            },
            shapes: {
                id: 'shapes', title: 'Shapes', color: 'bg-purple-400',
                items: [
                    { content: '⭕', label: 'Circle' }, { content: '🟥', label: 'Square' },
                    { content: '🔺', label: 'Triangle' }, { content: '⭐', label: 'Star' },
                    { content: '❤️', label: 'Heart' }, { content: '💎', label: 'Diamond' },
                    { content: '♦️', label: 'Rhombus' }, { content: '⬛', label: 'Rectangle' }
                ]
            }
        };

        const LEVELS = [
            { level: 1, pairs: 2, cols: 'grid-cols-2', rows: 'grid-rows-2' },
            { level: 2, pairs: 3, cols: 'grid-cols-2 sm:grid-cols-3', rows: 'grid-rows-3 sm:grid-rows-2' },
            { level: 3, pairs: 4, cols: 'grid-cols-2 sm:grid-cols-4', rows: 'grid-rows-4 sm:grid-rows-2' },
            { level: 4, pairs: 6, cols: 'grid-cols-3 sm:grid-cols-4', rows: 'grid-rows-4 sm:grid-rows-3' },
            { level: 5, pairs: 8, cols: 'grid-cols-4', rows: 'grid-rows-4' }
        ];

        const playVoice = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                if (preferredVoice) {
                    utterance.voice = preferredVoice;
                }
                
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.15; 
                utterance.volume = 0.9; 
                window.speechSynthesis.speak(utterance);
            }
        };

        const playDing = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                
                const playNote = (freq, startTime) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
                    
                    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
                    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + startTime + 0.3);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + startTime);
                    osc.stop(ctx.currentTime + startTime + 0.3);
                };

                playNote(523.25, 0);    
                playNote(659.25, 0.08); 
                playNote(783.99, 0.16); 
                playNote(1046.50, 0.24); 
            } catch (e) {
                console.log("Audio API not supported");
            }
        };

        const Confetti = () => {
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42e2b8'];
            const pieces = Array.from({ length: 50 }).map((_, i) => ({
                id: i,
                left: `${Math.random() * 100}%`,
                animationDelay: `${Math.random() * 2}s`,
                animationDuration: `${Math.random() * 2 + 2}s`,
                backgroundColor: colors[Math.floor(Math.random() * colors.length)]
            }));

            return (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                    {pieces.map(p => (
                        <div
                            key={p.id}
                            className="confetti rounded-full"
                            style={{
                                left: p.left,
                                backgroundColor: p.backgroundColor,
                                animation: `fall ${p.animationDuration} linear ${p.animationDelay} infinite`
                            }}
                        />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [gameState, setGameState] = useState('menu'); 
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
            
            const [cards, setCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [mismatchIndices, setMismatchIndices] = useState([]); 
            const [matches, setMatches] = useState(0);
            const [isLocked, setIsLocked] = useState(false);
            const [highlightMatch, setHighlightMatch] = useState(null); 
            const [autoNextCountdown, setAutoNextCountdown] = useState(null);

            const initGame = (categoryKey, levelIdx) => {
                const category = CATEGORIES[categoryKey];
                const level = LEVELS[levelIdx];
                
                const shuffledItems = [...category.items].sort(() => 0.5 - Math.random());
                const selectedItems = shuffledItems.slice(0, level.pairs);
                
                const gameCards = [...selectedItems, ...selectedItems]
                    .sort(() => 0.5 - Math.random())
                    .map((item, index) => ({
                        id: index,
                        ...item,
                        isFlipped: false,
                        isMatched: false
                    }));

                setSelectedCategory(categoryKey);
                setCurrentLevelIndex(levelIdx);
                setCards(gameCards);
                setFlippedIndices([]);
                setMismatchIndices([]);
                setMatches(0);
                setIsLocked(false);
                setHighlightMatch(null);
                setAutoNextCountdown(null);
                setGameState('playing');
            };

            const handleCardClick = (index) => {
                if (isLocked || cards[index].isFlipped || cards[index].isMatched) return;

                const textToSpeak = cards[index].spokenLabel || cards[index].label;
                playVoice(textToSpeak);

                // Update purely through state to prevent mutation bugs
                setCards(prev => prev.map((c, i) => i === index ? { ...c, isFlipped: true } : c));
                
                const newFlippedIndices = [...flippedIndices, index];
                setFlippedIndices(newFlippedIndices);

                if (newFlippedIndices.length === 2) {
                    setIsLocked(true);
                    const [firstIndex, secondIndex] = newFlippedIndices;
                    
                    const isMatch = cards[firstIndex].label === cards[secondIndex].label;

                    setTimeout(() => {
                        if (isMatch) {
                            playDing();
                            setHighlightMatch(cards[firstIndex]);
                            
                            setTimeout(() => {
                                setCards(prev => prev.map((c, i) => 
                                    (i === firstIndex || i === secondIndex) ? { ...c, isMatched: true } : c
                                ));
                                setFlippedIndices([]);
                                setMatches(m => m + 1);
                                setHighlightMatch(null); 
                                setIsLocked(false);
                            }, 2000); 
                        } else {
                            setMismatchIndices([firstIndex, secondIndex]);
                            
                            setTimeout(() => {
                                setCards(prev => prev.map((c, i) => 
                                    (i === firstIndex || i === secondIndex) ? { ...c, isFlipped: false } : c
                                ));
                                setFlippedIndices([]);
                                setMismatchIndices([]);
                                setIsLocked(false);
                            }, 800);
                        }
                    }, 1100);
                }
            };

            const currentLevel = LEVELS[currentLevelIndex];

            useEffect(() => {
                let winTimer;
                let countdownTimer;

                if (currentLevel && matches > 0 && matches === currentLevel.pairs && gameState === 'playing') {
                    winTimer = setTimeout(() => {
                        playVoice("Great job!");
                        setGameState('won');
                    }, 800);
                }

                if (gameState === 'won' && currentLevelIndex < LEVELS.length - 1) {
                    let timeLeft = 4;
                    setAutoNextCountdown(timeLeft);
                    countdownTimer = setInterval(() => {
                        timeLeft -= 1;
                        setAutoNextCountdown(timeLeft);
                        if (timeLeft <= 0) {
                            clearInterval(countdownTimer);
                            initGame(selectedCategory, currentLevelIndex + 1);
                        }
                    }, 1000);
                }

                return () => {
                    if (winTimer) clearTimeout(winTimer);
                    if (countdownTimer) clearInterval(countdownTimer);
                };
            }, [matches, currentLevel, gameState, currentLevelIndex, selectedCategory]);

            if (gameState === 'menu' || gameState === 'level_select') {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center p-4 bg-polka overflow-y-auto">
                        <div className="bg-white/95 backdrop-blur-sm rounded-3xl shadow-[0_10px_0_rgba(209,213,219,1)] p-6 sm:p-8 max-w-lg w-full text-center border-4 border-yellow-300 my-auto">
                            <h1 className="text-4xl md:text-5xl font-extrabold text-blue-600 mb-8 drop-shadow-sm">
                                🌟 Memory Game 🌟
                            </h1>
                            
                            <div className="animate-fade-in w-full mx-auto">
                                {gameState === 'menu' ? (
                                    <div>
                                        <h2 className="text-xl sm:text-2xl font-bold text-gray-700 mb-6">Choose Category to Play:</h2>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            {Object.keys(CATEGORIES).map(key => (
                                                <button 
                                                    key={key}
                                                    onClick={() => {
                                                        setSelectedCategory(key);
                                                        setGameState('level_select');
                                                    }}
                                                    className={`${CATEGORIES[key].color} hover:opacity-80 text-white font-bold py-5 sm:py-6 px-2 rounded-2xl shadow-md transform transition active:scale-95 text-lg sm:text-xl flex flex-col items-center justify-center gap-1`}
                                                >
                                                    <span>{CATEGORIES[key].title}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-fade-in">
                                        <div className="flex justify-between items-center mb-6">
                                            <button 
                                                onClick={() => setGameState('menu')}
                                                className="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2 px-3 sm:px-4 rounded-xl shadow-sm transition active:scale-95 text-sm"
                                            >
                                                ⬅️ Back
                                            </button>
                                            <h2 className="text-xl sm:text-2xl font-bold text-gray-700 truncate px-2">{CATEGORIES[selectedCategory].title}</h2>
                                            <div className="w-[70px] sm:w-[85px]"></div>
                                        </div>
                                        
                                        <h3 className="text-lg sm:text-xl font-bold text-gray-600 mb-4">Choose Starting Stage:</h3>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            {LEVELS.map((lvl, idx) => (
                                                <button 
                                                    key={idx}
                                                    onClick={() => initGame(selectedCategory, idx)}
                                                    className="bg-yellow-100 hover:bg-yellow-300 text-yellow-900 border-2 border-yellow-400 font-bold py-4 px-2 rounded-2xl shadow-sm transform transition active:scale-95 text-lg flex flex-col items-center"
                                                >
                                                    <span>Stage {lvl.level}</span>
                                                    <span className="text-xs sm:text-sm font-normal opacity-80 mt-1">{lvl.pairs} Pairs</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 flex flex-col items-center p-2 sm:p-4 bg-polka overflow-hidden">
                    {gameState === 'won' && <Confetti />}
                    
                    <div className="w-full max-w-2xl flex justify-between items-center mb-2 sm:mb-3 mt-1 sm:mt-2 shrink-0">
                        <button 
                            onClick={() => {
                                setGameState('menu');
                                setSelectedCategory(null);
                            }}
                            className="bg-white text-blue-500 font-bold py-1.5 sm:py-2 px-3 sm:px-4 rounded-xl shadow border-2 border-blue-200 hover:bg-blue-50 active:scale-95 transition text-xs sm:text-base"
                        >
                            Menu
                        </button>
                        <h2 className="text-lg sm:text-2xl font-bold text-gray-700 truncate px-2">
                            Stage {currentLevelIndex + 1}
                        </h2>
                        <div className="text-xs sm:text-lg font-bold text-green-600 bg-white px-2 sm:px-3 py-1 rounded-xl shadow whitespace-nowrap">
                            Pairs: {matches} / {currentLevel.pairs}
                        </div>
                    </div>

                    <div className="w-full max-w-2xl bg-white border-2 border-gray-100 rounded-full h-2 sm:h-4 mb-2 sm:mb-4 shrink-0 shadow-inner overflow-hidden relative">
                        <div 
                            className="bg-green-400 h-full rounded-full transition-all duration-700 ease-out flex items-center justify-end px-1 sm:px-2"
                            style={{width: `${Math.max(5, (matches / currentLevel.pairs) * 100)}%`}}
                        >
                            {matches > 0 && <span className="text-[8px] sm:text-[10px] text-white font-bold animate-fade-in">⭐</span>}
                        </div>
                    </div>

                    <div className="flex-1 w-full max-w-2xl min-h-0 flex items-center justify-center pb-2">
                        <div className={`grid gap-2 sm:gap-4 w-full h-full ${currentLevel.cols} ${currentLevel.rows} perspective-1000`}>
                            {cards.map((card, index) => {
                                const isMismatched = mismatchIndices.includes(index);
                                return (
                                <div 
                                    key={index}
                                    onClick={() => handleCardClick(index)}
                                    className={`relative w-full h-full cursor-pointer transform-style-3d transition-transform ${card.isFlipped || card.isMatched ? 'rotate-y-180' : ''} ${card.isMatched ? 'animate-bounce-match opacity-90' : ''} ${isMismatched ? 'animate-shake' : ''}`}
                                >
                                    <div className={`absolute inset-0 bg-gradient-to-br from-yellow-300 via-orange-400 to-pink-400 rounded-2xl sm:rounded-3xl shadow-[0_6px_0_rgba(217,119,6,1)] border-2 sm:border-4 border-white flex justify-center items-center backface-hidden ${card.isFlipped || card.isMatched ? 'hidden' : ''}`}>
                                        <div className="absolute inset-1 sm:inset-2 border-2 border-dashed border-white/50 rounded-xl sm:rounded-2xl"></div>
                                        <span className="text-white opacity-95 font-black emoji-shadow" style={{ fontSize: 'clamp(2rem, 10vmin, 5rem)' }}>?</span>
                                    </div>
                                    
                                    <div className={`absolute inset-0 bg-gradient-to-br from-white to-blue-50 rounded-2xl sm:rounded-3xl shadow-[0_6px_0_rgba(147,197,253,1)] border-2 sm:border-4 border-blue-200 flex flex-col justify-center items-center backface-hidden rotate-y-180 overflow-hidden ${!(card.isFlipped || card.isMatched) ? 'hidden' : ''}`}>
                                        
                                        {selectedCategory === 'abc' ? (
                                            <span className="emoji-shadow transform hover:scale-110 transition duration-300 z-10" style={{ fontSize: 'clamp(2rem, 12vmin, 5rem)' }}>{card.content}</span>
                                        ) : (
                                            <>
                                                <div className="flex-1 w-full flex items-center justify-center min-h-0 pt-1">
                                                    <span className="emoji-shadow transform hover:scale-110 transition duration-300 z-10 leading-none" style={{ fontSize: 'clamp(1.5rem, 8vmin, 4rem)' }}>{card.content}</span>
                                                </div>
                                                
                                                <div className="hidden sm:flex shrink-0 w-full justify-center items-end pb-1 sm:pb-2 px-1">
                                                    <span className="font-extrabold text-blue-600 tracking-wide uppercase bg-white/90 px-2 py-0.5 rounded-full z-10 shadow-sm border border-blue-100 truncate max-w-[95%] text-center" style={{ fontSize: 'clamp(0.6rem, 3vmin, 1rem)' }}>
                                                        {card.label}
                                                    </span>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    </div>

                    {highlightMatch && (
                        <div className="fixed inset-0 flex items-center justify-center z-40 bg-black/30 backdrop-blur-sm animate-fade-in pointer-events-none">
                            <div className="bg-gradient-to-br from-white to-yellow-50 rounded-[3rem] p-8 sm:p-12 shadow-[0_20px_60px_rgba(0,0,0,0.3)] flex flex-col items-center justify-center transform scale-100 animate-bounce-ui border-8 border-yellow-300">
                                <span className="text-[6rem] sm:text-[8rem] leading-none mb-4 emoji-shadow">{highlightMatch.content}</span>
                                {selectedCategory !== 'abc' && (
                                    <span className="text-3xl sm:text-5xl font-black text-blue-600 uppercase tracking-widest bg-white px-8 py-3 rounded-full shadow-md border-2 border-blue-100">
                                        {highlightMatch.label}
                                    </span>
                                )}
                            </div>
                        </div>
                    )}

                    {gameState === 'won' && (
                        <div className="fixed inset-0 flex items-center justify-center bg-black/40 z-40 backdrop-blur-md p-4 animate-fade-in">
                            <div className="bg-gradient-to-br from-white to-green-50 rounded-[2rem] p-6 sm:p-8 shadow-[0_15px_50px_rgba(0,0,0,0.3)] text-center max-w-md w-full border-8 border-yellow-400 transform scale-100 animate-bounce-ui">
                                <h2 className="text-4xl font-black text-green-500 mb-2 emoji-shadow">Awesome! 🎉</h2>
                                <p className="text-xl text-gray-700 mb-6 font-bold">You found all the pairs!</p>
                                
                                {autoNextCountdown !== null && currentLevelIndex < LEVELS.length - 1 && (
                                    <div className="mb-6 bg-blue-50 text-blue-800 px-4 py-3 rounded-xl border-2 border-blue-200">
                                        <p className="font-bold text-sm sm:text-base mb-1">Moving to next stage in...</p>
                                        <div className="text-3xl font-black text-blue-500 animate-bounce-ui" key={autoNextCountdown}>
                                            {autoNextCountdown}
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col gap-3">
                                    {currentLevelIndex < LEVELS.length - 1 ? (
                                        <button 
                                            onClick={() => initGame(selectedCategory, currentLevelIndex + 1)}
                                            className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transform transition active:scale-95 text-lg sm:text-xl flex justify-center items-center gap-2"
                                        >
                                            Next Stage Now ➡️
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={() => initGame(selectedCategory, 0)}
                                            className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transform transition active:scale-95 text-xl"
                                        >
                                            Play Again
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => {
                                            setGameState('menu');
                                            setSelectedCategory(null);
                                        }}
                                        className="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-2xl shadow transform transition active:scale-95"
                                    >
                                        Main Menu
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

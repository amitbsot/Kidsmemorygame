вҖҸ    <script type="text/babel">
вҖҸ        const { useState, useEffect, useRef } = React;

вҖҸ        // --- Voice Selection ---
вҖҸ        let preferredVoice = null;
вҖҸ        const updateVoiceSelection = () => {
вҖҸ            if (!('speechSynthesis' in window)) return;
вҖҸ            const voices = window.speechSynthesis.getVoices();
вҖҸ            preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Samantha') || v.name.includes('Victoria') || v.name.includes('Female') || v.name.includes('Google UK English Female'))) 
вҖҸ                          || voices.find(v => v.lang.includes('en') && v.name.includes('Google'))
вҖҸ                          || voices.find(v => v.lang === 'en-US') 
вҖҸ                          || null;
        };

вҖҸ        if ('speechSynthesis' in window) {
вҖҸ            updateVoiceSelection();
вҖҸ            window.speechSynthesis.onvoiceschanged = updateVoiceSelection;
        }

вҖҸ        // --- Game Data ---
вҖҸ        const CATEGORIES = {
вҖҸ            abc: {
вҖҸ                id: 'abc', title: 'Letters', color: 'bg-blue-400',

вҖҸ                    { content: 'рҹҡӮ', label: 'Train' }, { content: 'вңҲпёҸ', label: 'Airplane' },
вҖҸ                    { content: 'вӣө', label: 'Boat' }, { content: 'рҹҡІ', label: 'Bicycle' },

                ]
            },
вҖҸ            shapes: {
вҖҸ                id: 'shapes', title: 'Shapes', color: 'bg-purple-400',
вҖҸ                items: [
вҖҸ                    { content: 'вӯ•', label: 'Circle' }, { content: 'рҹҹҘ', label: 'Square' },
вҖҸ                    { content: 'рҹ”ә', label: 'Triangle' }, { content: 'вӯҗ', label: 'Star' },

вҖҸ        // --- Stage Progression System ---
        // Ч”Ч•ЧЎЧӨЧӘ ЧһЧ‘Ч Ч” ЧЁЧ©ЧӘ ЧһЧҷЧ•Ч—Ч“ ЧңЧӘЧҰЧ•Ч’Ч” ЧЁЧ•Ч—Ч‘ЧҷЧӘ ЧӣЧ“Чҷ Ч©Ч”ЧӣЧң ЧҷЧҷЧӣЧ ЧЎ Ч‘ЧҰЧ•ЧЁЧ” ЧӨЧЁЧ•ЧӨЧ•ЧЁЧҰЧҷЧ•Ч ЧңЧҷЧӘ
вҖҸ        const LEVELS = [
вҖҸ            { level: 1, pairs: 2, cols: 'grid-cols-2 landscape:grid-cols-4', rows: 'grid-rows-2 landscape:grid-rows-1' },
вҖҸ            { level: 2, pairs: 3, cols: 'grid-cols-2 sm:grid-cols-3 landscape:grid-cols-3', rows: 'grid-rows-3 sm:grid-rows-2 landscape:grid-rows-2' },
вҖҸ            { level: 3, pairs: 4, cols: 'grid-cols-2 sm:grid-cols-4 landscape:grid-cols-4', rows: 'grid-rows-4 sm:grid-rows-2 landscape:grid-rows-2' },
вҖҸ            { level: 4, pairs: 6, cols: 'grid-cols-3 sm:grid-cols-4 landscape:grid-cols-4', rows: 'grid-rows-4 sm:grid-rows-3 landscape:grid-rows-3' },
вҖҸ            { level: 5, pairs: 8, cols: 'grid-cols-4', rows: 'grid-rows-4' }
        ];

вҖҸ        // --- Audio Services ---
вҖҸ        const playVoice = (text) => {
вҖҸ            if ('speechSynthesis' in window) {
вҖҸ                window.speechSynthesis.cancel();
вҖҸ                const utterance = new SpeechSynthesisUtterance(text);
                
вҖҸ                if (preferredVoice) {
вҖҸ                    utterance.voice = preferredVoice;
                }
                
вҖҸ                utterance.lang = 'en-US';
вҖҸ                utterance.rate = 0.85; 
вҖҸ                utterance.pitch = 1.15; 
вҖҸ                utterance.volume = 0.9; 
вҖҸ                window.speechSynthesis.speak(utterance);
            }
        };

вҖҸ        const playDing = () => {
вҖҸ            try {
вҖҸ                const AudioContext = window.AudioContext || window.webkitAudioContext;
вҖҸ                const ctx = new AudioContext();
                
вҖҸ                if (ctx.state === 'suspended') {
вҖҸ                    ctx.resume();
                }
                
вҖҸ                const playNote = (freq, startTime) => {
вҖҸ                    const osc = ctx.createOscillator();
вҖҸ                    const gain = ctx.createGain();
вҖҸ                    osc.type = 'sine';
вҖҸ                    osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
                    
вҖҸ                    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
вҖҸ                    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + startTime + 0.05);
вҖҸ                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + startTime + 0.3);
                    
вҖҸ                    osc.connect(gain);
вҖҸ                    gain.connect(ctx.destination);
вҖҸ                    osc.start(ctx.currentTime + startTime);
вҖҸ                    osc.stop(ctx.currentTime + startTime + 0.3);
                };

вҖҸ                playNote(523.25, 0);    
вҖҸ                playNote(659.25, 0.08); 
вҖҸ                playNote(783.99, 0.16); 
вҖҸ                playNote(1046.50, 0.24); 
вҖҸ            } catch (e) {
вҖҸ                console.log("Audio API not supported");
            }
        };

вҖҸ        const Confetti = () => {
вҖҸ            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42e2b8'];
вҖҸ            const pieces = Array.from({ length: 50 }).map((_, i) => ({
вҖҸ                id: i,
вҖҸ                left: `${Math.random() * 100}%`,
вҖҸ                animationDelay: `${Math.random() * 2}s`,
вҖҸ                animationDuration: `${Math.random() * 2 + 2}s`,
вҖҸ                backgroundColor: colors[Math.floor(Math.random() * colors.length)]
            }));

вҖҸ            return (
вҖҸ                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
вҖҸ                    {pieces.map(p => (
вҖҸ                        <div
вҖҸ                            key={p.id}
вҖҸ                            className="confetti rounded-full"
вҖҸ                            style={{
вҖҸ                                left: p.left,
вҖҸ                                backgroundColor: p.backgroundColor,
вҖҸ                                animation: `fall ${p.animationDuration} linear ${p.animationDelay} infinite`
                            }}
                        />
                    ))}
вҖҸ                </div>

        };

вҖҸ        // --- Main Game Component ---
вҖҸ        const App = () => {
вҖҸ            const [gameState, setGameState] = useState('menu'); 
вҖҸ            const [selectedCategory, setSelectedCategory] = useState(null);
вҖҸ            const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
            
вҖҸ            const [cards, setCards] = useState([]);
вҖҸ            const [flippedIndices, setFlippedIndices] = useState([]);
вҖҸ            const [mismatchIndices, setMismatchIndices] = useState([]); 
вҖҸ            const [matches, setMatches] = useState(0);
вҖҸ            const [isLocked, setIsLocked] = useState(false);
вҖҸ            const [highlightMatch, setHighlightMatch] = useState(null); 
вҖҸ            const [autoNextCountdown, setAutoNextCountdown] = useState(null);

вҖҸ            const initGame = (categoryKey, levelIdx) => {
вҖҸ                const category = CATEGORIES[categoryKey];
вҖҸ                const level = LEVELS[levelIdx];
                
вҖҸ                const shuffledItems = [...category.items].sort(() => 0.5 - Math.random());
вҖҸ                const selectedItems = shuffledItems.slice(0, level.pairs);
                
вҖҸ                const gameCards = [...selectedItems, ...selectedItems]
вҖҸ                    .sort(() => 0.5 - Math.random())
вҖҸ                    .map((item, index) => ({
вҖҸ                        id: index,
вҖҸ                        ...item,
вҖҸ                        isFlipped: false,
вҖҸ                        isMatched: false
                    }));

вҖҸ                setSelectedCategory(categoryKey);
вҖҸ                setCurrentLevelIndex(levelIdx);
вҖҸ                setCards(gameCards);
вҖҸ                setFlippedIndices([]);
вҖҸ                setMismatchIndices([]);
вҖҸ                setMatches(0);
вҖҸ                setIsLocked(false);
вҖҸ                setHighlightMatch(null);
вҖҸ                setAutoNextCountdown(null);
вҖҸ                setGameState('playing');
            };

вҖҸ            const handleCardClick = (index) => {
вҖҸ                if (isLocked || cards[index].isFlipped || cards[index].isMatched) return;

вҖҸ                const textToSpeak = cards[index].spokenLabel || cards[index].label;
вҖҸ                playVoice(textToSpeak);

вҖҸ                const newCards = [...cards];
вҖҸ                newCards[index].isFlipped = true;
вҖҸ                setCards(newCards);

вҖҸ                const newFlippedIndices = [...flippedIndices, index];
вҖҸ                setFlippedIndices(newFlippedIndices);

вҖҸ                if (newFlippedIndices.length === 2) {
вҖҸ                    setIsLocked(true);
вҖҸ                    const [firstIndex, secondIndex] = newFlippedIndices;

вҖҸ                    setTimeout(() => {
вҖҸ                        if (newCards[firstIndex].label === newCards[secondIndex].label) {
вҖҸ                            playDing();
вҖҸ                            setHighlightMatch(newCards[firstIndex]);
                            
вҖҸ                            setTimeout(() => {
вҖҸ                                const matchedCards = [...newCards];
вҖҸ                                matchedCards[firstIndex].isMatched = true;
вҖҸ                                matchedCards[secondIndex].isMatched = true;
вҖҸ                                setCards(matchedCards);
вҖҸ                                setFlippedIndices([]);
вҖҸ                                setMatches(m => m + 1);
вҖҸ                                setHighlightMatch(null); 
вҖҸ                                setIsLocked(false);
                            }, 2000); 
вҖҸ                        } else {
вҖҸ                            setMismatchIndices([firstIndex, secondIndex]);
                            
вҖҸ                            setTimeout(() => {
вҖҸ                                const resetCards = [...newCards];
вҖҸ                                resetCards[firstIndex].isFlipped = false;
вҖҸ                                resetCards[secondIndex].isFlipped = false;
вҖҸ                                setCards(resetCards);
вҖҸ                                setFlippedIndices([]);
вҖҸ                                setMismatchIndices([]);
вҖҸ                                setIsLocked(false);
                            }, 800);
                        }
                    }, 1100);
                }
            };

вҖҸ            const currentLevel = LEVELS[currentLevelIndex];

вҖҸ            useEffect(() => {
вҖҸ                let timer;
вҖҸ                if (currentLevel && matches === currentLevel.pairs && gameState === 'playing') {
вҖҸ                    setTimeout(() => {
вҖҸ                        playVoice("Great job!");
вҖҸ                        setGameState('won');
                    }, 800);
                }

вҖҸ                if (gameState === 'won' && currentLevelIndex < LEVELS.length - 1) {
вҖҸ                    let timeLeft = 4;
вҖҸ                    setAutoNextCountdown(timeLeft);
вҖҸ                    timer = setInterval(() => {
вҖҸ                        timeLeft -= 1;
вҖҸ                        setAutoNextCountdown(timeLeft);
вҖҸ                        if (timeLeft <= 0) {
вҖҸ                            clearInterval(timer);
вҖҸ                            initGame(selectedCategory, currentLevelIndex + 1);
                        }
                    }, 1000);
                }

вҖҸ                return () => {
вҖҸ                    if (timer) clearInterval(timer);
                };
вҖҸ            }, [matches, currentLevel, gameState, currentLevelIndex, selectedCategory]);

вҖҸ            if (gameState === 'menu' || gameState === 'level_select') {
вҖҸ                return (
вҖҸ                    <div className="fixed inset-0 flex flex-col items-center justify-center p-4 bg-polka overflow-y-auto">
вҖҸ                        <div className="bg-white/95 backdrop-blur-sm rounded-3xl shadow-[0_10px_0_rgba(209,213,219,1)] p-6 sm:p-8 max-w-lg w-full text-center border-4 border-yellow-300 my-auto">
вҖҸ                            <h1 className="text-4xl md:text-5xl font-extrabold text-blue-600 mb-8 drop-shadow-sm">
вҖҸ                                рҹҢҹ Memory Game рҹҢҹ
вҖҸ                            </h1>
                            
вҖҸ                            <div className="animate-fade-in w-full mx-auto">
вҖҸ                                {gameState === 'menu' ? (
вҖҸ                                    <div>
вҖҸ                                        <h2 className="text-xl sm:text-2xl font-bold text-gray-700 mb-6">Choose Category to Play:</h2>
вҖҸ                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
вҖҸ                                            {Object.keys(CATEGORIES).map(key => (
вҖҸ                                                <button 
вҖҸ                                                    key={key}
вҖҸ                                                    onClick={() => {
вҖҸ                                                        setSelectedCategory(key);
вҖҸ                                                        setGameState('level_select');
                                                    }}
вҖҸ                                                    className={`${CATEGORIES[key].color} hover:opacity-80 text-white font-bold py-5 sm:py-6 px-2 rounded-2xl shadow-md transform transition active:scale-95 text-lg sm:text-xl flex flex-col items-center justify-center gap-1`}
                                                >
вҖҸ                                                    <span>{CATEGORIES[key].title}</span>
вҖҸ                                                </button>
                                            ))}
вҖҸ                                        </div>
вҖҸ                                    </div>
                                ) : (
вҖҸ                                    <div className="animate-fade-in">
вҖҸ                                        <div className="flex justify-between items-center mb-6">
вҖҸ                                            <button 
вҖҸ                                                onClick={() => setGameState('menu')}
вҖҸ                                                className="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2 px-3 sm:px-4 rounded-xl shadow-sm transition active:scale-95 text-sm"
                                            >
вҖҸ                                                в¬…пёҸ Back
вҖҸ                                            </button>
вҖҸ                                            <h2 className="text-xl sm:text-2xl font-bold text-gray-700 truncate px-2">{CATEGORIES[selectedCategory].title}</h2>

вҖҸ                                            {LEVELS.map((lvl, idx) => (
вҖҸ                                                <button

вҖҸ                                                    onClick={() => initGame(selectedCategory, idx)}

                                            ))}
вҖҸ                                        </div>
вҖҸ                                    </div>
                                )}
вҖҸ                            </div>
вҖҸ                        </div>
вҖҸ                    </div>
                );
            }

вҖҸ            return (
вҖҸ                <div className="fixed inset-0 flex flex-col items-center p-2 sm:p-4 bg-polka overflow-hidden">
вҖҸ                    {gameState === 'won' && <Confetti />}
                    
вҖҸ                    {/* Header - ЧһЧ•Ч§ЧҳЧҹ ЧһЧўЧҳ Ч‘ЧЁЧ•Ч—Ч‘Чҷ ЧӣЧ“Чҷ ЧңЧ”Ч©ЧҗЧҷЧЁ ЧһЧ§Ч•Чқ ЧңЧӣЧЁЧҳЧҷЧЎЧҷЧқ */}
вҖҸ                    <div className="w-full max-w-2xl flex justify-between items-center mb-2 sm:mb-3 mt-1 sm:mt-2 shrink-0">
вҖҸ                        <button

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kids Memory Game - Fun & Educational</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Memory Game">
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Rubik', sans-serif;
            background-color: #e0f2fe;
            background-image: radial-gradient(#bae6fd 15%, transparent 15%);
            background-size: 30px 30px;
            overscroll-behavior: none; /* מונע Pull-to-refresh וגלילת יתר בניידים */
            color: #1e293b;
        }

        /* --- Colorful Toy Styles --- */
        .gentle-toy-card {
            background-color: #ffffff;
            border: 4px solid #60a5fa;
            border-radius: 24px;
            box-shadow: 6px 8px 0px 0px #93c5fd; 
            transition: all 0.15s ease-out;
        }
        
        .gentle-toy-button {
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 16px;
            box-shadow: 0px 5px 0px 0px rgba(0,0,0,0.15);
            transition: all 0.1s;
            cursor: pointer;
        }
        .gentle-toy-button:hover { filter: brightness(0.95) saturate(1.2); }
        .gentle-toy-button:active {
            transform: translateY(5px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,0.1);
        }

        .gentle-title {
            color: #1e40af;
            text-shadow: 2px 2px 0px #bfdbfe;
        }

        /* --- Game Utilities --- */
        .seo-content { user-select: text; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transition-transform { transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceMatch {
            0%, 100% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.08) rotateY(180deg); }
        }
        .animate-bounce-match { animation: bounceMatch 0.5s ease-in-out; }

        @keyframes bounceUI {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-bounce-ui { animation: bounceUI 0.5s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotateY(180deg); }
            20% { transform: translateX(-4px) rotateY(180deg) rotate(-2deg); }
            40% { transform: translateX(4px) rotateY(180deg) rotate(2deg); }
            60% { transform: translateX(-4px) rotateY(180deg) rotate(-2deg); }
            80% { transform: translateX(4px) rotateY(180deg) rotate(2deg); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }

        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background-color: #f00; opacity: 0;
        }
        @keyframes fall {
            0% { opacity: 1; top: -10%; transform: translateX(0) rotate(0deg); }
            100% { opacity: 1; top: 110%; transform: translateX(20px) rotate(360deg); }
        }
        
        /* סגנון למסך מלא לחלוטין ללא מסגרות */
        .fullscreen-active {
            border-radius: 0 !important; border: none !important;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left) !important; 
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef } = React;

        const Header = () => (
            <header className="bg-white/90 backdrop-blur-md border-b-4 border-blue-200 py-4 px-6 sticky top-0 z-40 flex justify-center sm:justify-between items-center shadow-sm">
                <div className="flex items-center gap-2">
                    <span className="text-3xl">🧠</span>
                    <h1 className="text-2xl sm:text-3xl font-black gentle-title">Kids Memory</h1>
                </div>
                <nav className="hidden sm:flex gap-4 font-bold text-blue-600">
                    <a href="#about-game" className="hover:text-blue-400 transition">How to Play</a>
                </nav>
            </header>
        );

        const SeoContentSection = () => (
            <article className="seo-content max-w-4xl mx-auto p-6 sm:p-10 bg-white rounded-3xl gentle-toy-card mt-8 mb-12">
                <h2 id="about-game" className="text-3xl sm:text-4xl font-black text-blue-800 mb-6 text-center gentle-title">
                    Welcome to the Ultimate Kids Memory Game!
                </h2>
                <div className="space-y-6 text-slate-700 leading-relaxed text-lg font-medium">
                    <p>Our <strong>Free Kids Memory Game</strong> is designed to provide hours of fun while simultaneously enhancing cognitive skills, concentration, and short-term memory.</p>
                </div>
            </article>
        );

        let preferredVoice = null;
        const updateVoiceSelection = () => {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Samantha') || v.name.includes('Victoria') || v.name.includes('Female') || v.name.includes('Google UK English Female'))) 
                          || voices.find(v => v.lang.includes('en') && v.name.includes('Google'))
                          || voices.find(v => v.lang === 'en-US') 
                          || null;
        };

        if ('speechSynthesis' in window) {
            updateVoiceSelection();
            window.speechSynthesis.onvoiceschanged = updateVoiceSelection;
        }

        const CATEGORIES = {
            animals: { id: 'animals', title: 'Animals', color: 'bg-orange-200', textColors: 'text-orange-800', items: [
                { content: '🐶', label: 'Dog' }, { content: '🐱', label: 'Cat' }, { content: '🐭', label: 'Mouse' }, 
                { content: '🐰', label: 'Rabbit' }, { content: '🦊', label: 'Fox' }, { content: '🐻', label: 'Bear' }, 
                { content: '🐼', label: 'Panda' }, { content: '🦁', label: 'Lion' }, { content: '🐯', label: 'Tiger' }, 
                { content: '🐮', label: 'Cow' }, { content: '🐷', label: 'Pig' }, { content: '🐸', label: 'Frog' }, 
                { content: '🐵', label: 'Monkey' }
            ]},
            abc: { id: 'abc', title: 'Letters', color: 'bg-blue-200', textColors: 'text-blue-800', items: [
                { content: 'A', label: 'A', spokenLabel: 'a' }, { content: 'B', label: 'B', spokenLabel: 'b' }, 
                { content: 'C', label: 'C', spokenLabel: 'c' }, { content: 'D', label: 'D', spokenLabel: 'd' }, 
                { content: 'E', label: 'E', spokenLabel: 'e' }, { content: 'F', label: 'F', spokenLabel: 'f' },
                { content: 'G', label: 'G', spokenLabel: 'g' }, { content: 'H', label: 'H', spokenLabel: 'h' },
                { content: 'I', label: 'I', spokenLabel: 'i' }, { content: 'J', label: 'J', spokenLabel: 'j' },
                { content: 'K', label: 'K', spokenLabel: 'k' }, { content: 'L', label: 'L', spokenLabel: 'l' }
            ]},
            colors: { id: 'colors', title: 'Colors', color: 'bg-red-200', textColors: 'text-red-800', items: [
                { content: '🔴', label: 'Red' }, { content: '🔵', label: 'Blue' }, { content: '🟢', label: 'Green' }, 
                { content: '🟡', label: 'Yellow' }, { content: '🟠', label: 'Orange' }, { content: '🟣', label: 'Purple' },
                { content: '🌸', label: 'Pink' }, { content: '🟤', label: 'Brown' }, { content: '⚫', label: 'Black' },
                { content: '⚪', label: 'White' }, { content: '🔘', label: 'Gray' }, { content: '🩵', label: 'Cyan' }
            ]},
            fruits: { id: 'fruits', title: 'Fruits', color: 'bg-green-200', textColors: 'text-green-800', items: [
                { content: '🍎', label: 'Apple' }, { content: '🍌', label: 'Banana' }, { content: '🍊', label: 'Orange' }, 
                { content: '🍇', label: 'Grapes' }, { content: '🍉', label: 'Watermelon' }, { content: '🍓', label: 'Strawberry' },
                { content: '🍋', label: 'Lemon' }, { content: '🍒', label: 'Cherry' }, { content: '🍑', label: 'Peach' },
                { content: '🍍', label: 'Pineapple' }, { content: '🥝', label: 'Kiwi' }, { content: '🥑', label: 'Avocado' }
            ]},
            transport: { id: 'transport', title: 'Vehicles', color: 'bg-yellow-200', textColors: 'text-yellow-800', items: [
                { content: '🚗', label: 'Car' }, { content: '🚌', label: 'Bus' }, { content: '🚂', label: 'Train' }, 
                { content: '✈️', label: 'Airplane' }, { content: '🚲', label: 'Bicycle' }, { content: '⛵', label: 'Boat' },
                { content: '🚁', label: 'Helicopter' }, { content: '🏍️', label: 'Motorcycle' }, { content: '🚚', label: 'Truck' },
                { content: '🚀', label: 'Rocket' }, { content: '🛴', label: 'Scooter' }, { content: '🚜', label: 'Tractor' }
            ]},
            shapes: { id: 'shapes', title: 'Shapes', color: 'bg-purple-200', textColors: 'text-purple-800', items: [
                { content: '⭕', label: 'Circle' }, { content: '🟥', label: 'Square' }, { content: '🔺', label: 'Triangle' }, 
                { content: '⭐', label: 'Star' }, { content: '❤️', label: 'Heart' }, { content: '♦️', label: 'Diamond' },
                { content: '🔲', label: 'Rectangle' }, { content: '🛑', label: 'Octagon' }, { content: '🌙', label: 'Crescent' },
                { content: '➕', label: 'Cross' }, { content: '☁️', label: 'Cloud' }, { content: '⚡', label: 'Lightning' }
            ]}
        };

        const LEVELS = [
            { level: 1, pairs: 3, cols: 'grid-cols-2 sm:grid-cols-3', rows: 'grid-rows-3 sm:grid-rows-2' },
            { level: 2, pairs: 6, cols: 'grid-cols-3 sm:grid-cols-4', rows: 'grid-rows-4 sm:grid-rows-3' },
            { level: 3, pairs: 8, cols: 'grid-cols-4', rows: 'grid-rows-4' },
            { level: 4, pairs: 10, cols: 'grid-cols-4 sm:grid-cols-5', rows: 'grid-rows-5 sm:grid-rows-4' },
            { level: 5, pairs: 12, cols: 'grid-cols-4 sm:grid-cols-6', rows: 'grid-rows-6 sm:grid-rows-4' }
        ];

        const playVoice = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.15; 
                utterance.volume = 0.9; 
                window.speechSynthesis.speak(utterance);
            }
        };

        const playDing = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') ctx.resume();
                const playNote = (freq, startTime) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
                    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
                    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + startTime + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + startTime);
                    osc.stop(ctx.currentTime + startTime + 0.3);
                };
                playNote(523.25, 0);    
                playNote(659.25, 0.08); 
                playNote(783.99, 0.16); 
                playNote(1046.50, 0.24); 
            } catch (e) { console.log("Audio API not supported"); }
        };

        const Confetti = () => {
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42e2b8'];
            const pieces = Array.from({ length: 50 }).map((_, i) => ({
                id: i, left: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 2}s`, animationDuration: `${Math.random() * 2 + 2}s`, backgroundColor: colors[Math.floor(Math.random() * colors.length)]
            }));
            return (
                <div className="absolute inset-0 pointer-events-none z-[70] overflow-hidden">
                    {pieces.map(p => <div key={p.id} className="confetti rounded-full" style={{ left: p.left, backgroundColor: p.backgroundColor, animation: `fall ${p.animationDuration} linear ${p.animationDelay} infinite` }} /> )}
                </div>
            );
        };

        const App = () => {
            const [gameState, setGameState] = useState('menu'); 
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
            const [previousLevelItems, setPreviousLevelItems] = useState([]);

            const [cards, setCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [mismatchIndices, setMismatchIndices] = useState([]); 
            const [matches, setMatches] = useState(0);
            const [isLocked, setIsLocked] = useState(false);
            const [highlightMatch, setHighlightMatch] = useState(null); 
            
            const [isFullscreen, setIsFullscreen] = useState(false);
            const boardRef = useRef(null);

            const [showPlayerModal, setShowPlayerModal] = useState(false);
            const [numPlayers, setNumPlayers] = useState(1);
            const [players, setPlayers] = useState([{ id: 1, name: 'Player 1', score: 0 }]);
            const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);

            useEffect(() => {
                const handleFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const enterFullscreen = (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    if (boardRef.current && boardRef.current.requestFullscreen) {
                        boardRef.current.requestFullscreen().catch(err => console.error(err));
                    }
                }
            };

            const exitFullscreen = (e) => {
                e.stopPropagation();
                if (document.fullscreenElement && document.exitFullscreen) {
                    document.exitFullscreen();
                }
            };

            const resetToMenu = () => {
                setGameState('menu');
                setSelectedCategory(null);
                setPreviousLevelItems([]); 
                setShowPlayerModal(false);
                if (document.fullscreenElement) document.exitFullscreen();
            };

            const handleNumPlayersChange = (n) => {
                setNumPlayers(n);
                setPlayers(prev => {
                    const newPlayers = [];
                    for (let i = 0; i < n; i++) {
                        newPlayers.push(prev[i] || { id: i + 1, name: `Player ${i + 1}`, score: 0 });
                    }
                    return newPlayers;
                });
            };

            const handleNameChange = (index, newName) => {
                setPlayers(prev => prev.map((p, i) => i === index ? { ...p, name: newName } : p));
            };

            const submitPlayers = () => {
                setPlayers(prev => prev.map((p, i) => ({ ...p, name: p.name.trim() || `Player ${i + 1}` })));
                setShowPlayerModal(false);
                setGameState('level_select');
            };

            const initGame = (categoryKey, levelIdx) => {
                const category = CATEGORIES[categoryKey];
                const level = LEVELS[levelIdx];
                
                let selectedItems = [];

                if (levelIdx > 0 && selectedCategory === categoryKey && previousLevelItems.length >= 2) {
                    const shuffledPrev = [...previousLevelItems].sort(() => 0.5 - Math.random());
                    const carryOverItems = shuffledPrev.slice(0, 2);
                    
                    const remainingPool = category.items.filter(item => !carryOverItems.some(c => c.label === item.label));
                    const shuffledRemaining = remainingPool.sort(() => 0.5 - Math.random());
                    const newItems = shuffledRemaining.slice(0, level.pairs - 2);
                    
                    selectedItems = [...carryOverItems, ...newItems].sort(() => 0.5 - Math.random());
                } else {
                    const shuffledItems = [...category.items].sort(() => 0.5 - Math.random());
                    selectedItems = shuffledItems.slice(0, level.pairs);
                }

                setPreviousLevelItems(selectedItems);
                setSelectedCategory(categoryKey);
                setCurrentLevelIndex(levelIdx);
                
                const gameCards = [...selectedItems, ...selectedItems].sort(() => 0.5 - Math.random()).map((item, index) => ({
                    id: index, ...item, isFlipped: false, isMatched: false
                }));

                setCards(gameCards);
                setFlippedIndices([]);
                setMismatchIndices([]);
                setMatches(0);
                setIsLocked(false);
                setHighlightMatch(null);
                
                setPlayers(prev => prev.map(p => ({ ...p, score: 0 })));
                setCurrentPlayerIndex(0);
                
                setGameState('playing');
                // הסרנו את הגלילה למעלה, אין צורך בזה במצב fixed
            };

            const handleCardClick = (e, index) => {
                if (e && e.nativeEvent) {
                    e.nativeEvent.stopImmediatePropagation();
                    e.stopPropagation();
                }

                if (isLocked || cards[index].isFlipped || cards[index].isMatched) return;

                const newFlippedIndices = [...flippedIndices, index];
                setCards(prev => prev.map((c, i) => i === index ? { ...c, isFlipped: true } : c));
                setFlippedIndices(newFlippedIndices);

                if (newFlippedIndices.length === 1) {
                    playVoice(cards[index].spokenLabel || cards[index].label);
                } 
                else if (newFlippedIndices.length === 2) {
                    setIsLocked(true);
                    const [firstIndex, secondIndex] = newFlippedIndices;
                    const isMatch = cards[firstIndex].label === cards[secondIndex].label;

                    if (!isMatch) {
                        playVoice(cards[secondIndex].spokenLabel || cards[secondIndex].label);
                    }

                    setTimeout(() => {
                        if (isMatch) {
                            playDing();
                            setHighlightMatch(cards[firstIndex]);
                            
                            setTimeout(() => {
                                playVoice(cards[firstIndex].spokenLabel || cards[firstIndex].label);
                            }, 100);

                            setTimeout(() => {
                                setCards(prev => prev.map((c, i) => (i === firstIndex || i === secondIndex) ? { ...c, isMatched: true } : c));
                                setFlippedIndices([]); 
                                setMatches(m => m + 1);
                                setPlayers(prev => prev.map((p, i) => i === currentPlayerIndex ? { ...p, score: p.score + 1 } : p));
                                setHighlightMatch(null); 
                                setIsLocked(false);
                            }, 2000); 
                        } else {
                            setMismatchIndices([firstIndex, secondIndex]);
                            setTimeout(() => {
                                setCards(prev => prev.map((c, i) => (i === firstIndex || i === secondIndex) ? { ...c, isFlipped: false } : c));
                                setFlippedIndices([]); 
                                setMismatchIndices([]); 
                                setCurrentPlayerIndex(prev => (prev + 1) % numPlayers);
                                setIsLocked(false);
                            }, 800);
                        }
                    }, 1100);
                }
            };

            const currentLevel = LEVELS[currentLevelIndex];
            const isPlaying = gameState === 'playing' || gameState === 'won';

            useEffect(() => {
                let winTimer;
                if (currentLevel && matches > 0 && matches === currentLevel.pairs && gameState === 'playing') {
                    winTimer = setTimeout(() => {
                        playVoice("Great job!");
                        setGameState('won');
                    }, 800);
                }
                return () => { if (winTimer) clearTimeout(winTimer); };
            }, [matches, currentLevel, gameState, currentLevelIndex, selectedCategory]);

            const maxScore = Math.max(...players.map(p => p.score));
            const winners = players.filter(p => p.score === maxScore);

            // תצוגת התפריטים הראשיים נשארת נגללת כרגיל
            if (!isPlaying) {
                return (
                    <div className="min-h-screen flex flex-col relative w-full">
                        <Header />

                        {showPlayerModal && (
                            <div className="fixed inset-0 z-50 bg-blue-900/40 backdrop-blur-sm flex justify-center items-center p-4">
                                <div className="bg-white rounded-[2rem] w-full max-w-md flex flex-col gentle-toy-card p-8 animate-bounce-ui relative">
                                    <button onClick={() => setShowPlayerModal(false)} className="absolute top-4 right-4 text-slate-300 hover:text-red-400 font-bold text-2xl">✕</button>
                                    <h2 className="text-3xl font-black text-blue-600 mb-8 text-center gentle-title">Who is playing?</h2>
                                    
                                    <div className="flex justify-center gap-4 mb-8">
                                        {[1, 2, 3, 4].map(n => (
                                            <button 
                                                key={n}
                                                onClick={() => handleNumPlayersChange(n)}
                                                className={`w-14 h-14 sm:w-16 sm:h-16 rounded-full font-bold text-2xl transition-transform border-[3px] ${numPlayers === n ? 'bg-blue-200 text-blue-800 border-blue-400 scale-110 shadow-[0_4px_0_#60a5fa]' : 'bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-100'}`}
                                            >
                                                {n}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <div className="space-y-4 mb-10">
                                        {players.map((p, i) => (
                                            <div key={p.id} className="flex items-center gap-3">
                                                <span className="text-3xl drop-shadow-sm">{['🔴','🔵','🟢','🟡'][i]}</span>
                                                <input 
                                                    type="text"
                                                    value={p.name}
                                                    onChange={(e) => handleNameChange(i, e.target.value)}
                                                    className="flex-1 border-[3px] border-blue-100 rounded-xl px-4 py-3 sm:py-4 text-xl font-bold text-slate-700 focus:border-blue-300 focus:outline-none transition-colors"
                                                    placeholder={`Player ${i + 1}`}
                                                    maxLength="12"
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <button 
                                        onClick={submitPlayers}
                                        className="w-full bg-green-400 text-white font-black py-4 px-6 gentle-toy-button border-green-600 shadow-[0_5px_0_#16a34a] text-2xl flex justify-center items-center gap-2"
                                    >
                                        Continue ➡️
                                    </button>
                                </div>
                            </div>
                        )}

                        <main className="flex-1 flex flex-col relative w-full items-center p-4 md:p-8 lg:p-12 justify-center">
                            <div className="w-full max-w-2xl bg-white/95 backdrop-blur-sm gentle-toy-card p-6 sm:p-10 text-center mx-auto">
                                <h2 className="text-4xl md:text-5xl font-black text-blue-600 mb-10 gentle-title">Select Game</h2>
                                
                                <div className="animate-fade-in w-full">
                                    {gameState === 'menu' ? (
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 sm:gap-6">
                                            {Object.keys(CATEGORIES).map(key => (
                                                <button 
                                                    key={key}
                                                    onClick={() => {
                                                        setSelectedCategory(key);
                                                        setShowPlayerModal(true);
                                                    }}
                                                    className={`${CATEGORIES[key].color} ${CATEGORIES[key].textColors} font-bold py-6 sm:py-8 px-2 gentle-toy-button text-lg flex flex-col items-center justify-center gap-2 border-[3px] border-white/50 shadow-md`}
                                                >
                                                    <span className="text-4xl sm:text-5xl mb-1 drop-shadow-sm">{CATEGORIES[key].items[0].content}</span>
                                                    <span className="text-base sm:text-xl">{CATEGORIES[key].title}</span>
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in">
                                            <div className="flex justify-between items-center mb-8">
                                                <button 
                                                    onClick={resetToMenu}
                                                    className="bg-blue-50 text-blue-500 font-bold py-3 px-4 sm:px-6 gentle-toy-button text-base border-blue-200"
                                                >⬅️ Back</button>
                                                <h3 className="text-2xl sm:text-3xl font-black text-blue-700 truncate px-2">{CATEGORIES[selectedCategory].title}</h3>
                                                <div className="w-[85px] sm:w-[100px]"></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 sm:gap-6">
                                                {LEVELS.map((lvl, idx) => (
                                                    <button 
                                                        key={idx}
                                                        onClick={() => initGame(selectedCategory, idx)}
                                                        className="bg-yellow-100 text-yellow-800 font-bold py-6 px-4 gentle-toy-button border-yellow-300 text-xl flex flex-col items-center gap-1"
                                                    >
                                                        <span>Stage {lvl.level}</span>
                                                        <span className="text-sm sm:text-base font-medium opacity-80">{lvl.pairs} Pairs</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>
                        <SeoContentSection />
                    </div>
                );
            }

            // --- תצוגת המשחק - נעולה ל-100dvh ללא גלילה! ---
            return (
                <div className="fixed inset-0 z-50 flex flex-col w-screen h-[100dvh] overflow-hidden bg-[#e0f2fe]" style={{ backgroundImage: 'radial-gradient(#bae6fd 15%, transparent 15%)', backgroundSize: '30px 30px' }}>
                    
                    {/* Header Game Area - Shrink 0 כדי שלא יתכווץ */}
                    <div className="w-full flex flex-col gap-2 shrink-0 z-10 px-3 sm:px-6 pt-3 pb-2 bg-white/40 backdrop-blur-sm border-b-2 border-white/50">
                        <div className="flex justify-between items-center">
                            <button 
                                onClick={resetToMenu}
                                className="bg-white text-blue-500 font-bold py-1.5 px-3 sm:py-2 sm:px-4 gentle-toy-button text-sm sm:text-base border-blue-200 shadow-sm"
                            >Menu</button>
                            <h3 className="text-xl sm:text-2xl md:text-3xl font-black text-blue-800 truncate px-2 gentle-title">Stage {currentLevelIndex + 1}</h3>
                            
                            {numPlayers === 1 && (
                                <div className="text-sm sm:text-lg md:text-xl font-bold text-green-600 bg-green-50 px-3 py-1.5 sm:py-2 rounded-xl border-[3px] border-green-200 shadow-sm whitespace-nowrap">
                                    Pairs: {matches} / {currentLevel.pairs}
                                </div>
                            )}
                        </div>

                        {numPlayers > 1 && (
                            <div className="flex gap-2 overflow-x-auto w-full justify-center pb-1">
                                {players.map((p, i) => (
                                    <div key={p.id} className={`px-3 py-1.5 rounded-xl shadow-sm border-[3px] flex items-center gap-1.5 transition-all duration-300 ${i === currentPlayerIndex ? 'bg-blue-100 border-blue-400 text-blue-800 transform scale-105 shadow-[0_3px_0_#60a5fa]' : 'bg-white border-blue-100 text-slate-500'}`}>
                                        <div className="w-2 h-2 rounded-full" style={{backgroundColor: ['#ef4444', '#3b82f6', '#22c55e', '#eab308'][i]}}></div>
                                        <span className="font-bold whitespace-nowrap text-sm sm:text-base">{p.name}:</span> 
                                        <span className="font-black text-sm sm:text-base">{p.score}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        <div className="w-full max-w-4xl mx-auto bg-white border-[3px] border-blue-100 rounded-full h-2 sm:h-3 mt-1 shadow-inner overflow-hidden relative">
                            <div 
                                className="bg-green-400 h-full rounded-full transition-all duration-700 ease-out flex items-center justify-end px-1"
                                style={{width: `${Math.max(5, (matches / currentLevel.pairs) * 100)}%`}}
                            >
                                {matches > 0 && <span className="text-[8px] sm:text-[10px] text-white font-bold animate-fade-in overflow-visible leading-none mb-[1px]">⭐</span>}
                            </div>
                        </div>
                    </div>

                    {/* Game Board Container - תופס את כל שאר המקום אבל מונע חריגה עם min-h-0 */}
                    <div className="flex-1 w-full min-h-0 min-w-0 flex items-center justify-center p-2 sm:p-4 md:p-6 lg:p-8 relative z-10">
                        <div 
                            ref={boardRef}
                            className={`w-full h-full max-w-6xl flex flex-col items-center justify-center bg-blue-50/60 backdrop-blur-md relative ${isFullscreen ? 'fullscreen-active bg-[#e0f2fe]' : 'border-[4px] sm:border-[6px] border-blue-200 shadow-xl rounded-[1.5rem] sm:rounded-[2.5rem] p-2 sm:p-4'}`}
                        >
                            
                            <button 
                                onClick={!isFullscreen ? enterFullscreen : undefined}
                                onDoubleClick={isFullscreen ? exitFullscreen : undefined}
                                className="absolute top-2 right-2 sm:top-4 sm:right-4 w-6 h-6 sm:w-8 sm:h-8 text-blue-400 hover:text-blue-600 z-50 transition"
                            >
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                                    {isFullscreen ? (
                                        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />
                                    ) : (
                                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                                    )}
                                </svg>
                            </button>

                            {/* הגריד מכווץ עצמו לגבולות הקונטיינר min-h-0 min-w-0 */}
                            <div className={`grid w-full h-full max-h-full max-w-full gap-2 sm:gap-3 md:gap-4 ${currentLevel.cols} ${currentLevel.rows} perspective-1000 mx-auto justify-items-center items-center`}>
                                {cards.map((card, index) => {
                                    const isMismatched = mismatchIndices.includes(index);
                                    return (
                                    <div 
                                        key={index} onClick={(e) => handleCardClick(e, index)}
                                        className={`relative w-full h-full min-h-0 min-w-0 cursor-pointer transform-style-3d transition-transform ${card.isFlipped || card.isMatched ? 'rotate-y-180' : ''} ${card.isMatched ? 'animate-bounce-match opacity-80' : ''} ${isMismatched ? 'animate-shake' : ''}`}
                                    >
                                        <div className={`absolute inset-0 bg-yellow-100 rounded-xl sm:rounded-2xl border-[3px] border-yellow-300 shadow-[0_4px_0_#fde047] sm:shadow-[0_5px_0_#fde047] flex justify-center items-center backface-hidden ${card.isFlipped || card.isMatched ? 'hidden' : ''}`}>
                                            <div className="absolute inset-1 sm:inset-2 border-2 border-dashed border-yellow-400/50 rounded-lg"></div>
                                            <span className="text-yellow-400 font-black" style={{ fontSize: 'clamp(1.5rem, 6vmin, 4rem)' }}>?</span>
                                        </div>
                                        
                                        <div className={`absolute inset-0 bg-white rounded-xl sm:rounded-2xl border-[3px] border-blue-200 shadow-[0_4px_0_#bfdbfe] sm:shadow-[0_5px_0_#bfdbfe] flex flex-col justify-center items-center backface-hidden rotate-y-180 overflow-hidden ${!(card.isFlipped || card.isMatched) ? 'hidden' : ''}`}>
                                            <div className="flex-1 w-full min-h-0 flex items-center justify-center p-1 sm:p-2">
                                                <img 
                                                    src={`cards/${card.label.toLowerCase()}.png`} 
                                                    alt={card.label}
                                                    className="max-w-[80%] max-h-[80%] object-contain drop-shadow-sm z-20 pointer-events-none"
                                                    onError={(e) => {
                                                        e.target.style.display = 'none';
                                                        if(e.target.nextSibling) e.target.nextSibling.style.display = 'block';
                                                    }}
                                                />
                                                <span className="transform hover:scale-110 transition duration-300 z-10 leading-none drop-shadow-sm hidden" style={{ fontSize: 'clamp(1.5rem, 6vmin, 4.5rem)' }}>
                                                    {card.content}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>

                            {highlightMatch && (
                                <div className="absolute inset-0 flex items-center justify-center z-[60] bg-blue-900/10 backdrop-blur-sm animate-fade-in pointer-events-none rounded-inherit">
                                    <div className="bg-white rounded-[2rem] sm:rounded-[3rem] p-6 sm:p-12 gentle-toy-card flex flex-col items-center justify-center transform scale-100 animate-bounce-ui">
                                        <img 
                                            src={`cards/${highlightMatch.label.toLowerCase()}.png`} 
                                            alt={highlightMatch.label}
                                            className="max-w-[8rem] max-h-[8rem] sm:max-w-[14rem] sm:max-h-[14rem] object-contain drop-shadow-md mb-4"
                                            onError={(e) => {
                                                e.target.style.display = 'none';
                                                if(e.target.nextSibling) e.target.nextSibling.style.display = 'block';
                                            }}
                                        />
                                        <span className="text-[5rem] sm:text-[8rem] leading-none mb-4 drop-shadow-md hidden">
                                            {highlightMatch.content}
                                        </span>
                                        
                                        {selectedCategory !== 'abc' && (
                                            <span className="text-2xl sm:text-4xl font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-6 sm:px-10 py-3 sm:py-4 rounded-full border-[3px] border-blue-200">{highlightMatch.label}</span>
                                        )}
                                    </div>
                                </div>
                            )}

                            {gameState === 'won' && (
                                <>
                                    <Confetti />
                                    <div className="absolute inset-0 flex items-center justify-center bg-blue-900/20 z-[60] backdrop-blur-sm p-4 animate-fade-in rounded-inherit">
                                        <div className="bg-white rounded-[2rem] p-6 sm:p-8 text-center max-w-md w-full gentle-toy-card transform scale-100 animate-bounce-ui">
                                            
                                            {numPlayers > 1 ? (
                                                <>
                                                    <h2 className="text-3xl sm:text-4xl font-black text-green-500 mb-2 gentle-title">
                                                        {winners.length > 1 ? "Great Job! 🤝" : `Awesome! 🏆`}
                                                    </h2>
                                                    <p className="text-lg sm:text-xl text-slate-600 mb-6 font-bold">
                                                        {winners.map(w => w.name).join(' & ')} got {winners[0].score} pairs!
                                                    </p>
                                                </>
                                            ) : (
                                                <>
                                                    <h2 className="text-4xl font-black text-green-500 mb-2 gentle-title">Awesome! 🎉</h2>
                                                    <p className="text-xl text-slate-600 mb-6 font-bold">You found all the pairs!</p>
                                                </>
                                            )}
                                            
                                            <div className="flex flex-col gap-3">
                                                {currentLevelIndex < LEVELS.length - 1 ? (
                                                    <button onClick={() => initGame(selectedCategory, currentLevelIndex + 1)} className="w-full bg-blue-400 text-white font-black py-4 px-6 gentle-toy-button border-blue-500 shadow-[0_5px_0_#3b82f6] text-lg flex justify-center items-center gap-2">Next Stage ➡️</button>
                                                ) : (
                                                    <button onClick={() => initGame(selectedCategory, 0)} className="w-full bg-blue-400 text-white font-black py-4 px-6 gentle-toy-button border-blue-500 shadow-[0_5px_0_#3b82f6] text-xl">Play Again</button>
                                                )}
                                                <button onClick={resetToMenu} className="w-full bg-slate-100 text-slate-600 font-bold py-3 px-6 gentle-toy-button border-slate-200 shadow-[0_4px_0_#cbd5e1] text-lg">Main Menu</button>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
